<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>QCII Encoder / Decoder (Single-File)</title>
<style>
  :root { color-scheme: dark; }
  body { font-family: system-ui, Segoe UI, Roboto, Arial, sans-serif; margin: 0; background:#0b0f14; color:#e8eef6; }
  .wrap { max-width: 980px; margin: 0 auto; padding: 20px; }
  h1 { font-size: 20px; margin: 0 0 12px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .card { background:#101826; border:1px solid #1b2a41; border-radius: 14px; padding: 14px; }
  label { display:block; font-size: 12px; opacity:.9; margin: 10px 0 6px; }
  select, input, button {
    width: 100%; box-sizing: border-box;
    border-radius: 12px; border: 1px solid #263a57;
    background: #0c1320; color:#e8eef6;
    padding: 10px 12px; font-size: 14px;
  }
  input[type="number"] { appearance: textfield; }
  .row { display:flex; gap: 10px; }
  .row > * { flex: 1; }
  button { cursor: pointer; background: #14243a; }
  button:hover { background:#193052; }
  button:disabled { opacity:.5; cursor:not-allowed; }
  .log {
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 12px; line-height: 1.4;
    background:#0a0f18; border:1px solid #1b2a41; border-radius: 12px;
    padding: 10px; height: 320px; overflow:auto;
    white-space: pre-wrap;
  }
  .pill { display:inline-block; padding: 3px 8px; border-radius: 999px; border:1px solid #263a57; background:#0c1320; font-size: 12px; }
  .status { display:flex; gap:10px; flex-wrap: wrap; align-items: center; margin-top: 10px; }
  .muted { opacity: .8; font-size: 12px; }
  .ok { border-color:#2b6; }
  .warn { border-color:#e6b422; }
  .bad { border-color:#e25555; }
  @media (max-width: 860px) { .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>QCII Encoder / Decoder (single index.html)</h1>

  <div class="grid">
    <div class="card">
      <div class="status">
        <span class="pill" id="audioState">Audio: not started</span>
        <span class="pill bad" id="micState">Mic: off</span>
        <span class="pill warn" id="decodeState">Decoder: idle</span>
      </div>

      <label>Tone A (Hz)</label>
      <select id="toneA"></select>

      <label>Tone B (Hz)</label>
      <select id="toneB"></select>

      <div class="row">
        <div>
          <label>Encoder A (ms)</label>
          <input id="durA" type="number" value="1000" min="200" max="5000" />
        </div>
        <div>
          <label>Gap (ms)</label>
          <input id="gap" type="number" value="0" min="0" max="2000" />
        </div>
        <div>
          <label>Encoder B (ms)</label>
          <input id="durB" type="number" value="3000" min="200" max="8000" />
        </div>
      </div>

      <div class="row">
        <div>
          <label>Output Level</label>
          <input id="level" type="number" value="0.2" min="0.01" max="0.9" step="0.01" />
        </div>
        <div>
          <label>Decoder A req (ms)</label>
          <input id="aReq" type="number" value="1000" min="400" max="2000" step="10" />
        </div>
        <div>
          <label>Decoder B window (ms)</label>
          <input id="bReq" type="number" value="3000" min="800" max="6000" step="10" />
        </div>
      </div>

      <div class="row">
        <div>
          <label>Confidence ratio</label>
          <input id="ratio" type="number" value="1.20" min="1.05" max="3.0" step="0.05" />
        </div>
        <div>
          <label>Dropout tolerance (ms)</label>
          <input id="dropout" type="number" value="220" min="0" max="600" step="10" />
        </div>
        <div>
          <label>Reset silence (ms)</label>
          <input id="resetSilence" type="number" value="500" min="0" max="1500" step="25" />
        </div>
      </div>

      <div class="row">
        <div>
          <label>B winner ratio (top/2nd)</label>
          <input id="bWinRatio" type="number" value="1.20" min="1.05" max="3.0" step="0.05" />
        </div>
        <div>
          <label>Min B “coverage” (%)</label>
          <input id="bCoverage" type="number" value="55" min="10" max="100" step="1" />
        </div>
        <div>
          <label class="muted">Voting = mic-friendly</label>
          <input disabled value="(on)" />
        </div>
      </div>

      <div class="row" style="margin-top:12px;">
        <button id="btnInit">Start Audio</button>
        <button id="btnPlay" disabled>Play QCII</button>
      </div>

      <div class="row" style="margin-top:10px;">
        <button id="btnMic" disabled>Start Mic Decode</button>
        <button id="btnStop" disabled>Stop Decode</button>
      </div>

      <p class="muted" style="margin:10px 0 0;">
        Tip: If B still struggles, lower Confidence ratio a bit (1.15) and increase Dropout tolerance (250–300).
      </p>
    </div>

    <div class="card">
      <label>Log</label>
      <div class="log" id="log"></div>
    </div>
  </div>
</div>

<script>
// ==========================
// QCII Tone Table (trimmed)
// Expand this list as desired.
// ==========================
const QCII_FREQS = [
  433.7, 457.9, 483.5, 510.5, 539.0, 569.1, 600.9, 634.5, 669.9, 707.3,
  746.8, 788.5, 832.5, 879.0, 928.1, 979.9, 1034.0, 1092.4, 1153.4, 1218.5,
  1285.8, 1351.6, 1418.1, 1485.4, 1553.4, 1622.2, 1691.8
];

const $ = (id) => document.getElementById(id);
const logEl = $("log");

function log(msg) {
  const ts = new Date().toLocaleTimeString();
  logEl.textContent += `[${ts}] ${msg}\n`;
  logEl.scrollTop = logEl.scrollHeight;
}

function setPill(id, text, cls) {
  const el = $(id);
  el.textContent = text;
  el.classList.remove("ok","warn","bad");
  if (cls) el.classList.add(cls);
}

function populateTones() {
  const a = $("toneA");
  const b = $("toneB");
  for (const f of QCII_FREQS) {
    const optA = document.createElement("option");
    optA.value = f;
    optA.textContent = f.toFixed(1);
    a.appendChild(optA);

    const optB = document.createElement("option");
    optB.value = f;
    optB.textContent = f.toFixed(1);
    b.appendChild(optB);
  }
  // Defaults for your test:
  a.value = "457.9";
  b.value = "1034.0";
}
populateTones();

// ==========================
// Encoder (Web Audio)
// ==========================
let audioCtx = null;
let outGain = null;

function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    outGain = audioCtx.createGain();
    outGain.gain.value = 0.2;
    outGain.connect(audioCtx.destination);
    setPill("audioState", `Audio: ${audioCtx.state}`, "ok");
  }
}

$("btnInit").addEventListener("click", async () => {
  ensureAudio();
  if (audioCtx.state !== "running") await audioCtx.resume();
  setPill("audioState", `Audio: ${audioCtx.state}`, "ok");
  $("btnPlay").disabled = false;
  $("btnMic").disabled = false;
  log("Audio started.");
});

function playTone(freq, startTime, durationSec, level) {
  const osc = audioCtx.createOscillator();
  osc.type = "sine";
  osc.frequency.value = freq;

  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.0001, startTime);
  g.gain.exponentialRampToValueAtTime(level, startTime + 0.01);
  g.gain.setValueAtTime(level, startTime + Math.max(0.01, durationSec - 0.02));
  g.gain.exponentialRampToValueAtTime(0.0001, startTime + durationSec);

  osc.connect(g).connect(outGain);
  osc.start(startTime);
  osc.stop(startTime + durationSec + 0.02);
}

$("btnPlay").addEventListener("click", () => {
  ensureAudio();
  const toneA = parseFloat($("toneA").value);
  const toneB = parseFloat($("toneB").value);
  const durA = parseFloat($("durA").value) / 1000;
  const gap  = parseFloat($("gap").value) / 1000;
  const durB = parseFloat($("durB").value) / 1000;
  const level = Math.min(0.9, Math.max(0.01, parseFloat($("level").value)));

  outGain.gain.value = level;

  const t0 = audioCtx.currentTime + 0.05;
  playTone(toneA, t0, durA, level);
  playTone(toneB, t0 + durA + gap, durB, level);

  log(`ENCODE: A=${toneA.toFixed(1)}Hz for ${durA.toFixed(2)}s, gap=${gap.toFixed(2)}s, B=${toneB.toFixed(1)}Hz for ${durB.toFixed(2)}s`);
});

// ==========================
// Decoder (Mic + Goertzel)
// ==========================
let micStream = null;
let micSource = null;
let processor = null;
let zeroGainSink = null;

const DecoderState = {
  IDLE: "IDLE",
  SEEK_A: "SEEK_A",
  SEEK_B: "SEEK_B",
  WAIT_RESET: "WAIT_RESET",
};

let state = DecoderState.IDLE;

// Stability tracking (A detection)
let stableTone = null;
let stableMs = 0;
let dropoutMs = 0;
let silenceMs = 0;

let gotA = null;
let lastB = null;

// B voting window accumulators
let bElapsedMs = 0;
let bScore = new Map();      // tone -> score
let bDetectMs = new Map();   // tone -> ms detected (coverage)
let bTotalDetectMs = 0;

function resetBWindow() {
  bElapsedMs = 0;
  bScore.clear();
  bDetectMs.clear();
  bTotalDetectMs = 0;
}

// Exact-frequency Goertzel (no bin rounding)
function goertzelPower(frame, sampleRate, targetFreq) {
  const omega = 2 * Math.PI * (targetFreq / sampleRate);
  const coeff = 2 * Math.cos(omega);

  let s0 = 0, s1 = 0, s2 = 0;
  for (let i = 0; i < frame.length; i++) {
    s0 = frame[i] + coeff * s1 - s2;
    s2 = s1;
    s1 = s0;
  }
  return (s1 * s1) + (s2 * s2) - (coeff * s1 * s2);
}

function findDominantTone(frame, sampleRate, ratioMin) {
  // Remove DC
  let mean = 0;
  for (let i = 0; i < frame.length; i++) mean += frame[i];
  mean /= frame.length;

  const x = new Float32Array(frame.length);
  for (let i = 0; i < frame.length; i++) x[i] = frame[i] - mean;

  // Scan QCII list
  let bestF = null;
  let bestP = -Infinity;
  let secondP = -Infinity;

  for (const f of QCII_FREQS) {
    const p = goertzelPower(x, sampleRate, f);
    if (p > bestP) {
      secondP = bestP;
      bestP = p;
      bestF = f;
    } else if (p > secondP) {
      secondP = p;
    }
  }

  const ratio = bestP / Math.max(1e-9, secondP);
  if (ratio < ratioMin) return null;
  return { freq: bestF, ratio };
}

function resetDecoder() {
  state = DecoderState.SEEK_A;
  stableTone = null;
  stableMs = 0;
  dropoutMs = 0;
  silenceMs = 0;
  gotA = null;
  resetBWindow();
  setPill("decodeState", "Decoder: seeking A", "warn");
}

function stopDecoder() {
  try {
    if (processor) processor.disconnect();
    if (micSource) micSource.disconnect();
    if (zeroGainSink) zeroGainSink.disconnect();
  } catch (_) {}

  processor = null;
  micSource = null;
  zeroGainSink = null;

  if (micStream) {
    micStream.getTracks().forEach(t => t.stop());
    micStream = null;
  }

  state = DecoderState.IDLE;
  setPill("micState", "Mic: off", "bad");
  setPill("decodeState", "Decoder: idle", "warn");
}

$("btnMic").addEventListener("click", async () => {
  ensureAudio();
  try {
    micStream = await navigator.mediaDevices.getUserMedia({
      audio: {
        echoCancellation: false,
        noiseSuppression: false,
        autoGainControl: false
      }
    });
  } catch (e) {
    log("Mic permission denied or unavailable.");
    setPill("micState", "Mic: error", "bad");
    return;
  }

  micSource = audioCtx.createMediaStreamSource(micStream);

  const bufSize = 4096;
  processor = audioCtx.createScriptProcessor(bufSize, 1, 1);

  micSource.connect(processor);

  // processor must connect somewhere to run; use zero gain to avoid feedback
  zeroGainSink = audioCtx.createGain();
  zeroGainSink.gain.value = 0;
  processor.connect(zeroGainSink);
  zeroGainSink.connect(audioCtx.destination);

  resetDecoder();
  setPill("micState", "Mic: on", "ok");
  $("btnStop").disabled = false;

  const frameMs = (bufSize / audioCtx.sampleRate) * 1000;

  processor.onaudioprocess = (evt) => {
    if (state === DecoderState.IDLE) return;

    const A_REQ = parseFloat($("aReq").value);          // ms
    const B_REQ = parseFloat($("bReq").value);          // ms (window length)
    const RATIO_MIN = parseFloat($("ratio").value);
    const MAX_DROPOUT = parseFloat($("dropout").value);
    const RESET_SILENCE = parseFloat($("resetSilence").value);

    const B_WIN_RATIO = parseFloat($("bWinRatio").value); // top/2nd
    const B_COV_PCT = parseFloat($("bCoverage").value);   // 0..100

    const input = evt.inputBuffer.getChannelData(0);
    const dom = findDominantTone(input, audioCtx.sampleRate, RATIO_MIN);
    const nowTone = dom ? dom.freq : null;

    // Track silence (for reset arming)
    if (!nowTone) silenceMs += frameMs;
    else silenceMs = 0;

    // --- A: stable-time tracker (dropout tolerant) ---
    if (nowTone === null) {
      dropoutMs += frameMs;
      if (dropoutMs > MAX_DROPOUT) {
        stableTone = null;
        stableMs = 0;
      }
    } else {
      if (stableTone === nowTone) {
        stableMs += frameMs;
        dropoutMs = 0;
      } else {
        stableTone = nowTone;
        stableMs = frameMs;
        dropoutMs = 0;
      }
    }

    if (state === DecoderState.SEEK_A) {
      // Ignore tail of last B so it doesn't become next A
      if (lastB !== null && stableTone !== null && stableTone === lastB) return;

      if (stableTone !== null && stableMs >= A_REQ) {
        gotA = stableTone;
        log(`DECODE: got A=${gotA.toFixed(1)}Hz (stable ${(stableMs/1000).toFixed(2)}s, ratio ${dom ? dom.ratio.toFixed(2) : "?"})`);
        setPill("decodeState", `Decoder: got A=${gotA.toFixed(1)}Hz, measuring B...`, "warn");

        // Move to B voting window
        state = DecoderState.SEEK_B;
        resetBWindow();

        // Reset A stability so it doesn't affect B
        stableTone = null;
        stableMs = 0;
        dropoutMs = 0;
        return;
      }

    } else if (state === DecoderState.SEEK_B) {
      // Accumulate for exactly B_REQ ms (window)
      bElapsedMs += frameMs;

      // Vote only when we have a confident tone and it's not equal to A
      if (dom && dom.freq !== null && gotA !== null && dom.freq !== gotA) {
        const f = dom.freq;

        // Weight votes by ratio (cap it so one spike doesn't dominate)
        const w = Math.min(3.0, Math.max(1.0, dom.ratio));

        bScore.set(f, (bScore.get(f) || 0) + w);
        bDetectMs.set(f, (bDetectMs.get(f) || 0) + frameMs);
        bTotalDetectMs += frameMs;
      }

      if (bElapsedMs >= B_REQ) {
        // Decide winner
        const entries = Array.from(bScore.entries()).sort((a,b)=>b[1]-a[1]);
        const top = entries[0];
        const second = entries[1];

        const topFreq = top ? top[0] : null;
        const topScore = top ? top[1] : 0;
        const secondScore = second ? second[1] : 1e-9;

        const winRatio = topScore / Math.max(1e-9, secondScore);

        const topMs = topFreq ? (bDetectMs.get(topFreq) || 0) : 0;
        const coverage = (topMs / Math.max(1e-9, B_REQ)) * 100;

        const enoughCoverage = coverage >= B_COV_PCT;
        const clearWinner = winRatio >= B_WIN_RATIO;

        if (topFreq !== null && enoughCoverage && clearWinner) {
          const gotB = topFreq;
          lastB = gotB;

          log(`DECODE: got B=${gotB.toFixed(1)}Hz (vote coverage ${coverage.toFixed(0)}%, winRatio ${winRatio.toFixed(2)})`);
          log(`QCII RESULT: A=${gotA.toFixed(1)}Hz, B=${gotB.toFixed(1)}Hz`);
          setPill("decodeState", `Decoder: QCII A=${gotA.toFixed(1)} B=${gotB.toFixed(1)}`, "ok");
        } else {
          log(`QCII FAILED: A=${gotA ? gotA.toFixed(1) : "?"}Hz, B not reliable (coverage ${coverage.toFixed(0)}%, winRatio ${winRatio.toFixed(2)})`);
          setPill("decodeState", "Decoder: FAILED (no reliable B)", "bad");
          // We did NOT lock a B
          lastB = null;
        }

        // After decision (pass or fail), require reset before next A
        state = DecoderState.WAIT_RESET;
        stableTone = null;
        stableMs = 0;
        dropoutMs = 0;
        silenceMs = 0;
        gotA = null;
        resetBWindow();
        return;
      }

    } else if (state === DecoderState.WAIT_RESET) {
      if (silenceMs >= RESET_SILENCE) {
        state = DecoderState.SEEK_A;
        setPill("decodeState", "Decoder: seeking A", "warn");
        stableTone = null;
        stableMs = 0;
        dropoutMs = 0;
        resetBWindow();
        return;
      }
    }
  };

  log("Decoder started (mic).");
});

$("btnStop").addEventListener("click", () => {
  stopDecoder();
  $("btnStop").disabled = true;
  log("Decoder stopped.");
});

// Encoder controls
$("btnInit").addEventListener("click", async () => {
  ensureAudio();
  if (audioCtx.state !== "running") await audioCtx.resume();
  setPill("audioState", `Audio: ${audioCtx.state}`, "ok");
  $("btnPlay").disabled = false;
  $("btnMic").disabled = false;
  log("Audio started.");
});

$("btnPlay").addEventListener("click", () => {
  ensureAudio();
  const toneA = parseFloat($("toneA").value);
  const toneB = parseFloat($("toneB").value);
  const durA = parseFloat($("durA").value) / 1000;
  const gap  = parseFloat($("gap").value) / 1000;
  const durB = parseFloat($("durB").value) / 1000;
  const level = Math.min(0.9, Math.max(0.01, parseFloat($("level").value)));

  outGain.gain.value = level;
  const t0 = audioCtx.currentTime + 0.05;
  playTone(toneA, t0, durA, level);
  playTone(toneB, t0 + durA + gap, durB, level);

  log(`ENCODE: A=${toneA.toFixed(1)}Hz for ${durA.toFixed(2)}s, gap=${gap.toFixed(2)}s, B=${toneB.toFixed(1)}Hz for ${durB.toFixed(2)}s`);
});

$("btnStop").addEventListener("click", () => {
  stopDecoder();
  $("btnStop").disabled = true;
  log("Decoder stopped.");
});

// Cleanup
window.addEventListener("beforeunload", () => stopDecoder());
</script>
</body>
</html>
